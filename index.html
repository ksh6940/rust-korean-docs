<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust 한국어 문서</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <h1>Rust 한국어 문서 프로젝트</h1>
        <nav>
            <ul>
                <li><a href="index.html">홈</a></li>
                <li><a href="?page=introduction">Rust 소개</a></li>
                <li><a href="?page=getting-started">시작하기</a></li>
                <li><a href="https://github.com/ksh6940/rust-korean-docs/blob/main/CONTRIBUTING.md" target="_blank">기여하기</a></li>
            </ul>
        </nav>
    </header>
    <main id="content">
        <section>
            <h2>환영합니다!</h2>
            <p>이 프로젝트는 Rust 프로그래밍 언어의 공식 문서를 한국어로 번역하고, 한국어 사용자들을 위한 추가적인 자료를 제공하기 위해 시작되었습니다. 모든 Rust 사용자들의 참여를 환영합니다!</p>
            <p>문서 번역 및 작성에 참여하고 싶으시다면 <a href="https://github.com/ksh6940/rust-korean-docs/blob/main/CONTRIBUTING.md" target="_blank">기여 가이드라인</a>을 확인해주세요.</p>
        </section>
        <section>
            <h2>최근 업데이트</h2>
            <ul>
                <li><a href="?page=introduction">Rust 소개</a> 문서 추가</li>
                <li><a href="?page=getting-started">시작하기</a> 문서 초안 작성</li>
            </ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Rust 한국어 문서 프로젝트 | <a href="https://github.com/ksh6940/rust-korean-docs" style="color: white;">GitHub 저장소</a></p>
    </footer>

    <script>
        const contentDiv = document.getElementById('content');
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page');

        if (page) {
            fetch(`./docs/${page}.md`)
                .then(response => {
                    if (!response.ok) throw new Error('Page not found');
                    return response.text();
                })
                .then(text => {
                    contentDiv.innerHTML = marked.parse(text);
                })
                .catch(err => {
                    contentDiv.innerHTML = '<h2>오류</h2><p>문서를 불러오는 중 오류가 발생했습니다.</p>';
                });
        }
    </script>
</body>
</html>
